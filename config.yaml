simulation:
  scene_path:       models/mujoco/scene.xml
  steps_per_action: 20
  q0:               [0, 0, 0, -1.5708, 0, 1.5708, -0.7854]

robot:
  urdf_path:     models/urdf/franka_fr3/fr3_franka_hand.urdf
  ee_frame_name: fr3_hand_tcp
  arm_dof:       7
  finger_joints:
    index_left:  7
    index_right: 8
  gripper:
    ctrl_index:       7
    ctrl_open:        255
    ctrl_close:       0
    open_width:       0.08
    grasp_width_min:  0.03
    grasp_width_max:  0.075

control:
  K_cart:               [800, 800, 800, 50, 50, 50]
  D_cart:               [50,  50,  50,  5,  5,  5]
  K_null:               10.0
  q_nominal:            [0, 0, 0, -1.5708, 0, 1.5708, -0.7854]
  tau_max:              [87, 87, 87, 87, 12, 12, 12]
  gravity_compensation: true

object:
  name:        box
  geom_name:   box_geom
  size:        [0.035, 0.035, 0.035]
  mass:        0.05
  pos:         [0.5, -0.3, 0.035]
  quat:        [1, 0, 0, 0]

task:
  target_pos:          [0.4, 0.2, 0.035]
  table_height:        0.0
  lift_margin:         0.05
  reach_gate_dist:     0.05
  place_success_dist:  0.05

reward:
  k_reach:       5.0
  w_grasp:       5.0
  w_lift:        10.0
  w_place:       20.0
  w_place_bonus: 100.0
  w_reg:         0.01

grasp_detection:
  contact_bodies:  [left_finger, right_finger]
  object_body:     box
  width_min:       0.03
  width_max:       0.075

rendering:
  enabled:     true
  window_name: Simulation
  camera:
    width:     1280
    height:    720
    fps:       30
    azimuth:   135
    elevation: -25
    distance:  1.8
    lookat:    [0.3, 0.0, 0.4]

training:
  algorithm:        SAC
  total_timesteps:  1_000_000
  batch_size:       256
  buffer_size:      100_000
  learning_rate:    3.0e-4
  gamma:            0.99
  tau:              0.005
  train_freq:       1
  gradient_steps:   1
  learning_starts:  1000
  seed:             42