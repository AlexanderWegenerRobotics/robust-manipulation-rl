simulation:
  scene_path:       models/mujoco/scene.xml
  steps_per_action: 20
  q0:               [0, 0, 0, -1.5708, 0, 1.5708, -0.7854]

robot:
  urdf_path:     models/urdf/franka_fr3/fr3_franka_hand.urdf
  ee_frame_name: fr3_hand_tcp
  arm_dof:       7
  finger_joints:
    index_left:  7
    index_right: 8
  gripper:
    ctrl_index:       7
    ctrl_open:        255
    ctrl_close:       0
    open_width:       0.08
    grasp_width_min:  0.03
    grasp_width_max:  0.075

control:
  K_cart:               [800, 800, 800, 50, 50, 50]
  D_cart:               [50, 50, 50, 5, 5, 5]
  K_null:               10.0
  q_nominal:            [0, 0, 0, -1.5708, 0, 1.5708, -0.7854]
  tau_max:              [87, 87, 87, 87, 12, 12, 12]
  gravity_compensation: true

action:
  delta_bounds:     [-0.05, 0.05]
  grasp_values:
    open:           255
    close:          0
  fixed_quaternion: [0, 1, 0, 0]

object:
  name:        box
  geom_name:   box_geom
  size:        [0.03, 0.03, 0.03]
  mass:        0.05
  pos:         [0.5, -0.3, 0.03]
  quat:        [1, 0, 0, 0]

task:
  target_pos:          [0.4, 0.2, 0.035]
  table_height:        0.0
  place_success_dist:  0.08
  place_success_z_tol: 0.05
  lift_target_h:       0.05

reward:
  w_reach:             3.0
  w_grasp_bonus:       15.0
  w_lift:              0.0
  w_place:             0.0
  r_success:           0.0
  w_action:            0.001
  w_time:              0.01
  r_drop:              1.0
  reach_success_dist:  0.03
  lift_success_height: 0.05

grasp_detection:
  contact_bodies: [left_finger, right_finger]
  object_body:    box
  width_min:      0.04
  width_max:      0.065

rendering:
  enabled:     true
  window_name: Simulation
  camera:
    width:     1280
    height:    720
    fps:       30
    azimuth:   135
    elevation: -25
    distance:  1.8
    lookat:    [0.3, 0.0, 0.4]

training:
  stage:                    reach_grasp
  n_envs:                   8
  max_episode_steps:        300
  total_timesteps:          100000
  batch_size:               256
  buffer_size:              1000000
  learning_rate:            3.0e-4
  gamma:                    0.99
  tau:                      0.005
  train_freq:               1
  gradient_steps:           1
  learning_starts:          1000
  seed:                     42
  resume_model_path:        null
  resume_replay_buffer_path: null
  reset_num_timesteps:      true